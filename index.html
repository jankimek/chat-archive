<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#0a0a0a;--bg2:#111;--card:#161616;
            --accent:#d4a03c;--accent-h:#b8862e;--accent-glow:rgba(212,160,60,.08);
            --fg:#e4e4e4;--fg2:#b0b0b0;--muted:#6a6a6a;
            --border:#232323;--err:#d94444;--rad:12px;
            --dot-opacity:.015
        }
        :root.light{
            --bg:#f5f3ef;--bg2:#eae7e1;--card:#ffffff;
            --accent:#b8862e;--accent-h:#9a6f24;--accent-glow:rgba(184,134,46,.1);
            --fg:#1a1a1a;--fg2:#444;--muted:#888;
            --border:#d8d4ce;--err:#c03030;
            --dot-opacity:.04
        }
        body{
            font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
            background:var(--bg);color:var(--fg);
            height:100vh;height:100dvh;overflow:hidden;
            transition:background .3s,color .3s
        }

        /* === PASSWORD SCREEN === */
        #pw-screen{
            position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
            background:var(--bg);z-index:100;padding:20px;
            transition:background .3s
        }
        #pw-screen::before{
            content:'';position:absolute;width:420px;height:420px;border-radius:50%;
            background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);
            top:18%;left:50%;transform:translateX(-50%);pointer-events:none
        }
        .pw-card{
            position:relative;background:var(--card);border:1px solid var(--border);
            border-radius:20px;padding:40px 28px 32px;width:100%;max-width:380px;
            text-align:center;
            box-shadow:0 0 80px var(--accent-glow),0 24px 64px rgba(0,0,0,.5);
            animation:cardIn .5s ease;transition:background .3s,border-color .3s
        }
        @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
        .lock-wrap{
            width:60px;height:60px;border:2px solid var(--accent);border-radius:50%;
            display:flex;align-items:center;justify-content:center;margin:0 auto 24px;
            color:var(--accent);background:var(--accent-glow)
        }
        .pw-card h1{font-size:24px;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
        .pw-card .sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:28px}
        .inp-wrap{position:relative;margin-bottom:8px}
        .inp-wrap input{
            width:100%;padding:14px 48px 14px 16px;background:var(--bg);
            border:1.5px solid var(--border);border-radius:var(--rad);color:var(--fg);
            font-size:15px;font-family:inherit;outline:none;
            transition:border-color .2s,background .3s,color .3s
        }
        .inp-wrap input:focus{border-color:var(--accent)}
        .inp-wrap input.shake{border-color:var(--err);animation:shake .4s ease}
        @keyframes shake{
            0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}
            40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}
        }
        .eye-btn{
            position:absolute;right:4px;top:50%;transform:translateY(-50%);
            width:40px;height:40px;display:flex;align-items:center;justify-content:center;
            background:none;border:none;color:var(--muted);cursor:pointer;border-radius:8px
        }
        .eye-btn:active{color:var(--fg)}
        .fld-err{color:var(--err);font-size:13px;min-height:28px;line-height:28px;text-align:left;padding-left:4px}
        .go-btn{
            width:100%;padding:14px;background:var(--accent);color:#0a0a0a;border:none;
            border-radius:var(--rad);font-size:15px;font-weight:700;font-family:inherit;
            cursor:pointer;transition:background .15s,transform .1s;margin-top:4px
        }
        .go-btn:active{transform:scale(.97);background:var(--accent-h)}
        .go-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

        /* === LOADING SCREEN === */
        #ld-screen{
            position:fixed;inset:0;display:none;flex-direction:column;
            align-items:center;justify-content:center;background:var(--bg);z-index:90;
            transition:background .3s
        }
        .sp{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:24px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .ld-txt{font-size:15px;font-weight:500;color:var(--fg2)}
        .ld-det{font-size:12px;color:var(--muted);margin-top:8px;font-variant-numeric:tabular-nums}

        /* === CHAT VIEW === */
        #chat-view{display:none;flex-direction:column;height:100vh;height:100dvh}
        .ch-hdr{
            flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);
            padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));
            display:flex;align-items:center;gap:12px;z-index:10;position:relative;
            transition:background .3s,border-color .3s
        }
        .hdr-icon{
            width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent-h));
            border-radius:10px;display:flex;align-items:center;justify-content:center;
            flex-shrink:0;color:#0a0a0a
        }
        .hdr-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
        .hdr-info h2{font-size:15px;font-weight:700;letter-spacing:-.2px}
        
        /* Editable Page Input */
        #hdr-meta {
            background:transparent;border:1px solid transparent;color:var(--muted);
            font-size:12px;font-family:inherit;width:80px;padding:2px 4px;border-radius:4px;
            outline:none;-moz-appearance:textfield;transition:border-color .2s,color .3s;
        }
        #hdr-meta::-webkit-outer-spin-button,
        #hdr-meta::-webkit-inner-spin-button {-webkit-appearance:none;margin:0}
        #hdr-meta:focus {border-color:var(--accent);color:var(--fg)}

        .theme-btn{
            width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
            background:var(--card);display:flex;align-items:center;justify-content:center;
            cursor:pointer;color:var(--fg);flex-shrink:0;
            transition:background .2s,border-color .2s,transform .1s
        }
        .theme-btn:active{transform:scale(.9)}
        .ch-scroll{
            flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
            padding:10px 10px 20px;display:flex;flex-direction:column;gap:10px;
            background-image:radial-gradient(circle,rgba(255,255,255,var(--dot-opacity)) 1px,transparent 1px);
            background-size:20px 20px
        }
        .ch-scroll::-webkit-scrollbar{width:3px}
        .ch-scroll::-webkit-scrollbar-track{background:transparent}
        .ch-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        .ld-trigger{
            text-align:center;padding:14px;color:var(--muted);font-size:12px;
            flex-shrink:0;user-select:none
        }
        .mini-sp{
            display:inline-block;width:16px;height:16px;border:2px solid var(--border);
            border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
            vertical-align:middle;margin-right:8px
        }
        .arc-start{
            text-align:center;padding:20px;color:var(--muted);font-size:11px;
            letter-spacing:1.5px;text-transform:uppercase;flex-shrink:0
        }
        .arc-start::before,.arc-start::after{
            content:'';display:inline-block;width:40px;height:1px;
            background:var(--border);vertical-align:middle;margin:0 12px
        }
        .pg-card{
            background:var(--card);border:1px solid var(--border);
            border-left:3px solid var(--accent);border-radius:var(--rad);
            overflow:hidden;flex-shrink:0;animation:fadeUp .35s ease both;
            transition:background .3s,border-color .3s
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        .pg-head{
            padding:6px 12px;border-bottom:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-between;
            background:rgba(255,255,255,.01);transition:border-color .3s
        }
        .pg-tag{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
        .pg-num{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}

        /* === PDF text content === */
        .pg-text {
            padding: 12px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--fg);
        }

        .sb-btn{
            position:fixed;bottom:20px;bottom:max(20px,env(safe-area-inset-bottom));
            right:16px;width:44px;height:44px;border-radius:50%;
            background:var(--card);border:1px solid var(--border);color:var(--fg);
            display:none;align-items:center;justify-content:center;cursor:pointer;
            z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.4);
            transition:transform .15s,background .3s,border-color .3s
        }
        .sb-btn:active{transform:scale(.9);background:var(--border)}
        .sb-btn.on{display:flex}
        .toast{
            position:fixed;bottom:80px;left:50%;
            transform:translateX(-50%) translateY(80px);
            background:var(--card);border:1px solid var(--border);color:var(--fg);
            padding:10px 20px;border-radius:10px;font-size:13px;z-index:200;
            transition:transform .3s ease,background .3s,border-color .3s,color .3s;
            white-space:nowrap;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.4)
        }
        .toast.on{transform:translateX(-50%) translateY(0)}
        .toast.t-err{border-color:var(--err);color:var(--err)}

        /* === BOOKMARKS DROPDOWN === */
        .menu-dd {
            position: absolute; top: 100%; right: 0; margin-top: 8px;
            width: 280px; background: var(--card); border: 1px solid var(--border);
            border-radius: var(--rad); box-shadow: 0 12px 32px rgba(0,0,0,.5);
            z-index: 15; display: none; flex-direction: column; overflow: hidden;
            transition: background .3s, border-color .3s;
        }
        .menu-dd.on { display: flex; }
        .bm-list { max-height: 320px; overflow-y: auto; padding: 8px 0; }
        .bm-list::-webkit-scrollbar { width: 4px; }
        .bm-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .bm-item {
            padding: 8px 16px; font-size: 13px; color: var(--fg2); cursor: pointer;
            transition: background .15s, color .15s; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .bm-item:hover { background: var(--bg2); color: var(--fg); }
        .bm-empty { padding: 16px; text-align: center; color: var(--muted); font-size: 13px; }

        @media(prefers-reduced-motion:reduce){
            .pw-card,.pg-card{animation:none}
            .sp,.mini-sp{animation-duration:1.5s}
            .inp-wrap input.shake{animation:none}
        }
    </style>
</head>
<body>

    <!-- ========== PASSWORD SCREEN ========== -->
    <div id="pw-screen">
        <div class="pw-card">
            <div class="lock-wrap">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1>Chat Archive</h1>
            <p class="sub">This archive is password-protected. Enter the correct password to view the messages inside.</p>
            <div class="inp-wrap">
                <input type="password" id="pw-in" placeholder="Enter password" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                <button class="eye-btn" id="eye-b" type="button" aria-label="Toggle password visibility">
                    <svg id="eye-o" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg id="eye-c" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
            <div class="fld-err" id="fld-err"></div>
            <button class="go-btn" id="go-btn">Unlock Archive</button>
        </div>
    </div>

    <!-- ========== LOADING SCREEN ========== -->
    <div id="ld-screen">
        <div class="sp"></div>
        <div class="ld-txt" id="ld-txt">Decrypting archive...</div>
        <div class="ld-det" id="ld-det"></div>
    </div>

    <!-- ========== CHAT VIEW ========== -->
    <div id="chat-view">
        <header class="ch-hdr">
            <div class="hdr-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                </svg>
            </div>
            <div class="hdr-info">
                <h2>Chat Archive</h2>
                <input type="number" id="hdr-meta" value="0" min="1" aria-label="Jump to page">
            </div>
            <button class="theme-btn" id="menu-b" aria-label="Bookmarks">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                </svg>
            </button>
            <button class="theme-btn" id="theme-b" aria-label="Toggle theme">
                <svg id="ico-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="ico-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>

            <!-- Bookmarks Dropdown -->
            <div id="menu-dd" class="menu-dd">
                <div id="bm-list" class="bm-list"></div>
            </div>
        </header>
        <div class="ch-scroll" id="ch-scroll"></div>
        <button class="sb-btn" id="sb-btn" aria-label="Scroll to latest messages">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast-el"></div>

    <script>
        /* =============================================
           PDF.js worker setup
           ============================================= */
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        /* =============================================
           CONFIGURATION
           ============================================= */
        var PDF_FILE    = 'chat.pdf';
        var BATCH       = 50;

        /* =============================================
           App state
           ============================================= */
        var pdf        = null;
        var totalPgs   = 0;
        var firstPg    = 1;
        var lastPg     = 1;      // Track the last loaded page for downward scrolling
        var busy       = false;
        var atStart    = false;
        var atEnd      = false;

        /* =============================================
           DOM handles
           ============================================= */
        var $pw     = document.getElementById('pw-screen');
        var $ld     = document.getElementById('ld-screen');
        var $cv     = document.getElementById('chat-view');
        var $pwIn   = document.getElementById('pw-in');
        var $eyeB   = document.getElementById('eye-b');
        var $eyeO   = document.getElementById('eye-o');
        var $eyeC   = document.getElementById('eye-c');
        var $fErr   = document.getElementById('fld-err');
        var $goBtn  = document.getElementById('go-btn');
        var $ldTxt  = document.getElementById('ld-txt');
        var $ldDet  = document.getElementById('ld-det');
        var $scroll = document.getElementById('ch-scroll');
        var $meta   = document.getElementById('hdr-meta');
        var $sb     = document.getElementById('sb-btn');
        var $toast  = document.getElementById('toast-el');

        var $menuB  = document.getElementById('menu-b');
        var $menuDd = document.getElementById('menu-dd');
        var $bmList = document.getElementById('bm-list');

        /* =============================================
           Theme toggle
           ============================================= */
        var $themeB  = document.getElementById('theme-b');
        var $icoSun  = document.getElementById('ico-sun');
        var $icoMoon = document.getElementById('ico-moon');
        var isDark   = true;

        var saved = localStorage.getItem('chat-arc-theme');
        if (saved === 'light') {
            isDark = false;
            document.documentElement.classList.add('light');
            $icoSun.style.display  = 'none';
            $icoMoon.style.display = 'block';
        }

        $themeB.addEventListener('click', function() {
            isDark = !isDark;
            if (isDark) {
                document.documentElement.classList.remove('light');
                $icoSun.style.display  = 'block';
                $icoMoon.style.display = 'none';
                localStorage.setItem('chat-arc-theme', 'dark');
            } else {
                document.documentElement.classList.add('light');
                $icoSun.style.display  = 'none';
                $icoMoon.style.display = 'block';
                localStorage.setItem('chat-arc-theme', 'light');
            }
        });

        /* =============================================
           Password screen interactions
           ============================================= */
        $eyeB.addEventListener('click', function() {
            var show = $pwIn.type === 'password';
            $pwIn.type = show ? 'text' : 'password';
            $eyeO.style.display = show ? 'none' : 'block';
            $eyeC.style.display = show ? 'block' : 'none';
        });

        $pwIn.addEventListener('input', function() {
            $fErr.textContent = '';
            $pwIn.classList.remove('shake');
        });

        $pwIn.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') $goBtn.click();
        });

        $goBtn.addEventListener('click', function() {
            var v = $pwIn.value;
            if (!v) {
                $fErr.textContent = 'Please enter a password.';
                $pwIn.classList.add('shake');
                return;
            }
            $fErr.textContent = '';
            $pwIn.classList.remove('shake');
            $goBtn.disabled = true;
            $goBtn.textContent = 'Verifying...';
            tryLoad(v);
        });

        /* =============================================
           Bookmarks Menu
           ============================================= */
        $menuB.addEventListener('click', function(e) {
            e.stopPropagation();
            $menuDd.classList.toggle('on');
        });

        document.addEventListener('click', function(e) {
            if (!$menuDd.contains(e.target) && e.target !== $menuB && !$menuB.contains(e.target)) {
                $menuDd.classList.remove('on');
            }
        });

        function buildBookmarksMenu(outline, level) {
            level = level || 0;
            var frag = document.createDocumentFragment();

            outline.forEach(function(item) {
                var el = document.createElement('div');
                el.className = 'bm-item';
                el.style.paddingLeft = (16 + level * 12) + 'px';
                el.textContent = item.title || 'Untitled';

                el.addEventListener('click', function() {
                    if (item.dest) {
                        navigateToDest(item.dest);
                    } else if (item.url) {
                        window.open(item.url, '_blank');
                    }
                    $menuDd.classList.remove('on');
                });

                frag.appendChild(el);

                if (item.items && item.items.length > 0) {
                    var childFrag = buildBookmarksMenu(item.items, level + 1);
                    frag.appendChild(childFrag);
                }
            });

            return frag;
        }

        function navigateToDest(dest) {
            var promise;
            if (typeof dest === 'string') {
                promise = pdf.getDestination(dest);
            } else {
                promise = Promise.resolve(dest);
            }

            promise.then(function(explicitDest) {
                if (!explicitDest || !explicitDest[0]) return;
                pdf.getPageIndex(explicitDest[0]).then(function(pageIndex) {
                    goToPage(pageIndex + 1);
                });
            }).catch(function(e) {
                console.error("Failed to navigate to destination", e);
                toast("Failed to jump to bookmark", true);
            });
        }

        /* =============================================
           Page Jump Logic (Edit Header Input)
           ============================================= */
        $meta.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                var pg = parseInt($meta.value, 10);
                if (!isNaN(pg)) {
                    goToPage(pg);
                    $meta.blur(); // hide keyboard
                }
            }
        });

        function goToPage(targetPg) {
            targetPg = Math.max(1, Math.min(totalPgs, targetPg));
            if (isNaN(targetPg)) return;

            $ld.style.display = 'flex';
            $cv.style.display = 'none';
            $ldTxt.textContent = 'Jumping to page ' + targetPg + '...';
            $ldDet.textContent = '';

            $scroll.innerHTML = '';
            busy = false;

            var start = targetPg;
            var end = Math.min(totalPgs, targetPg + BATCH - 1);
            
            firstPg = start;
            lastPg = end;
            atStart = (firstPg <= 1);
            atEnd = (lastPg >= totalPgs);

            renderBatch(start, end, true).then(function() {
                $ld.style.display = 'none';
                $cv.style.display = 'flex';
                
                var targetCard = $scroll.querySelector('[data-pg="' + targetPg + '"]');
                if (targetCard) {
                    targetCard.scrollIntoView();
                } else {
                    $scroll.scrollTop = 0;
                }
            });
        }

        /* =============================================
           Toast helper
           ============================================= */
        var _tt = null;
        function toast(msg, err) {
            clearTimeout(_tt);
            $toast.textContent = msg;
            $toast.className = 'toast' + (err ? ' t-err' : '');
            void $toast.offsetHeight;
            $toast.classList.add('on');
            _tt = setTimeout(function() { $toast.classList.remove('on'); }, 3500);
        }

        /* =============================================
           Load & decrypt the PDF
           ============================================= */
        function tryLoad(pw) {
            $pw.style.display = 'none';
            $ld.style.display = 'flex';
            $ldTxt.textContent = 'Decrypting archive...';
            $ldDet.textContent = '';

            pdfjsLib.getDocument({ url: PDF_FILE, password: pw })
            .promise.then(function(doc) {
                pdf = doc;
                totalPgs = doc.numPages;
                $meta.max = totalPgs;

                // Fetch bookmarks (outline)
                doc.getOutline().then(function(outline) {
                    $bmList.innerHTML = '';
                    if (outline && outline.length > 0) {
                        $bmList.appendChild(buildBookmarksMenu(outline));
                    } else {
                        var empty = document.createElement('div');
                        empty.className = 'bm-empty';
                        empty.textContent = 'No bookmarks in this PDF';
                        $bmList.appendChild(empty);
                    }
                });

                var start = Math.max(1, totalPgs - BATCH + 1);
                var end   = totalPgs;
                firstPg   = start;
                lastPg    = end;
                atStart   = (firstPg <= 1);
                atEnd     = true; // Initially loading the end

                $ldTxt.textContent = 'Extracting text...';
                $ldDet.textContent = '0 / ' + (end - start + 1);

                renderBatch(start, end, true).then(function() {
                    $ld.style.display = 'none';
                    $cv.style.display = 'flex';
                    $meta.value = totalPgs; // Set initial page in input
                    $scroll.scrollTop = $scroll.scrollHeight;
                });
            })
            .catch(function(e) {
                console.error(e);
                $ld.style.display = 'none';
                $pw.style.display = 'flex';
                $goBtn.disabled = false;
                $goBtn.textContent = 'Unlock Archive';

                if (e.name === 'PasswordException') {
                    $fErr.textContent = 'Wrong password. Please try again.';
                    $pwIn.classList.add('shake');
                    $pwIn.value = '';
                    $pwIn.focus();
                } else {
                    $fErr.textContent = 'File not found. Make sure "' + PDF_FILE + '" is uploaded.';
                    $pwIn.classList.add('shake');
                }
            });
        }

        /* =============================================
           Render a batch of PDF pages into cards (Text)
           ============================================= */
        function renderBatch(from, to, initial, position) {
            var count = to - from + 1;
            var done  = 0;
            var frag  = document.createDocumentFragment();
            var jobs  = [];
            var cards = {}; // Object to hold elements strictly by page number

            for (var p = from; p <= to; p++) {
                (function(num) {
                    jobs.push(
                        pdf.getPage(num).then(function(page) {
                            // Extract text content
                            return page.getTextContent().then(function(textContent) {
                                var card = document.createElement('div');
                                card.className = 'pg-card';
                                card.setAttribute('data-pg', num);

                                var head = document.createElement('div');
                                head.className = 'pg-head';
                                head.innerHTML =
                                    '<span class="pg-tag">Page ' + num + '</span>' +
                                    '<span class="pg-num">' + num + ' / ' + totalPgs + '</span>';

                                card.appendChild(head);

                                var textDiv = document.createElement('div');
                                textDiv.className = 'pg-text';
                                
                                // Reconstruct text properly by checking Y positions
                                var pageText = '';
                                var lastY = null;
                                textContent.items.forEach(function(item) {
                                    if (lastY !== null && Math.abs(item.transform[5] - lastY) > 2) {
                                        pageText += '\n';
                                    }
                                    pageText += item.str;
                                    if (item.hasEOL) pageText += '\n';
                                    lastY = item.transform[5];
                                });
                                
                                textDiv.textContent = pageText.trim() || '[No text content found on this page]';
                                card.appendChild(textDiv);
                                
                                cards[num] = card; // Store card keyed by its page number

                                done++;
                                if (initial) $ldDet.textContent = done + ' / ' + count;
                            });
                        })
                    );
                })(p);
            }

            return Promise.all(jobs).then(function() {
                // Append strictly sequentially in correct order to fix async scrambling
                for (var p = from; p <= to; p++) {
                    if (cards[p]) {
                        frag.appendChild(cards[p]);
                    }
                }

                if (initial) {
                    $scroll.appendChild(frag);

                    if (firstPg > 1) {
                        var topTrig = document.createElement('div');
                        topTrig.className = 'ld-trigger';
                        topTrig.id = 'ld-trig-top';
                        topTrig.textContent = 'Scroll up to load earlier pages';
                        $scroll.insertBefore(topTrig, $scroll.firstChild);
                    } else {
                        atStart = true;
                        var topMsg = document.createElement('div');
                        topMsg.className = 'arc-start';
                        topMsg.id = 'ld-trig-top';
                        topMsg.textContent = 'Start of Archive';
                        $scroll.insertBefore(topMsg, $scroll.firstChild);
                    }

                    if (lastPg < totalPgs) {
                        var botTrig = document.createElement('div');
                        botTrig.className = 'ld-trigger';
                        botTrig.id = 'ld-trig-bot';
                        botTrig.textContent = 'Scroll down to load later pages';
                        $scroll.appendChild(botTrig);
                    } else {
                        atEnd = true;
                        var botMsg = document.createElement('div');
                        botMsg.className = 'arc-start';
                        botMsg.id = 'ld-trig-bot';
                        botMsg.textContent = 'End of Archive';
                        $scroll.appendChild(botMsg);
                    }
                } else {
                    if (position === 'top') {
                        var trigTop = document.getElementById('ld-trig-top');
                        if (trigTop) {
                            $scroll.insertBefore(frag, trigTop);
                        } else {
                            $scroll.insertBefore(frag, $scroll.firstChild);
                        }
                    } else if (position === 'bottom') {
                        var trigBot = document.getElementById('ld-trig-bot');
                        if (trigBot) {
                            $scroll.insertBefore(frag, trigBot);
                        } else {
                            $scroll.appendChild(frag);
                        }
                    }
                }
            });
        }

        /* =============================================
           Scroll — load older/newer pages & update input
           ============================================= */
        $scroll.addEventListener('scroll', function() {
            var fromBot = $scroll.scrollHeight - $scroll.scrollTop - $scroll.clientHeight;
            
            if (fromBot > 600) { $sb.classList.add('on'); }
            else               { $sb.classList.remove('on'); }

            if (!atStart && !busy && $scroll.scrollTop < 100) {
                loadOlder();
            }

            if (!atEnd && !busy && fromBot < 100) {
                loadNewer();
            }

            // Update page input dynamically if not actively typing
            if (document.activeElement !== $meta) {
                var els = $scroll.querySelectorAll('.pg-card');
                for (var i = 0; i < els.length; i++) {
                    var rect = els[i].getBoundingClientRect();
                    if (rect.bottom > 80 && rect.top < window.innerHeight - 80) {
                        var pg = els[i].getAttribute('data-pg');
                        if ($meta.value !== pg) {
                            $meta.value = pg;
                        }
                        break;
                    }
                }
            }
        });

        function loadOlder() {
            busy = true;
            var trig = document.getElementById('ld-trig-top');
            if (trig) trig.innerHTML = '<span class="mini-sp"></span>Loading earlier pages...';

            var prevScrollTop = $scroll.scrollTop;
            var prevH = $scroll.scrollHeight;

            var newFirst = Math.max(1, firstPg - BATCH);
            var newLast  = firstPg - 1;

            renderBatch(newFirst, newLast, false, 'top').then(function() {
                firstPg = newFirst;
                
                var newH = $scroll.scrollHeight;
                $scroll.scrollTop = prevScrollTop + (newH - prevH);
                
                busy = false;

                var trig = document.getElementById('ld-trig-top');
                if (firstPg <= 1) {
                    atStart = true;
                    if (trig) {
                        trig.className = 'arc-start';
                        trig.innerHTML = 'Start of Archive';
                    }
                } else {
                    if (trig) trig.innerHTML = 'Scroll up to load earlier pages';
                }
            });
        }

        function loadNewer() {
            busy = true;
            var trig = document.getElementById('ld-trig-bot');
            if (trig) trig.innerHTML = '<span class="mini-sp"></span>Loading later pages...';

            var prevScrollTop = $scroll.scrollTop;

            var newFirst = lastPg + 1;
            var newLast  = Math.min(totalPgs, lastPg + BATCH);

            renderBatch(newFirst, newLast, false, 'bottom').then(function() {
                lastPg = newLast;
                $scroll.scrollTop = prevScrollTop;
                busy = false;

                var trig = document.getElementById('ld-trig-bot');
                if (lastPg >= totalPgs) {
                    atEnd = true;
                    if (trig) {
                        trig.className = 'arc-start';
                        trig.innerHTML = 'End of Archive';
                    }
                } else {
                    if (trig) trig.innerHTML = 'Scroll down to load later pages';
                }
            });
        }

        /* =============================================
           Scroll-to-bottom button
           ============================================= */
        $sb.addEventListener('click', function() {
            $scroll.scrollTo({ top: $scroll.scrollHeight, behavior: 'smooth' });
        });
    </script>
</body>
</html>

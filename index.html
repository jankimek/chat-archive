<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#0a0a0a;--bg2:#111;--card:#161616;
            --accent:#d4a03c;--accent-h:#b8862e;--accent-glow:rgba(212,160,60,.08);
            --fg:#e4e4e4;--fg2:#b0b0b0;--muted:#6a6a6a;
            --border:#232323;--err:#d94444;--rad:12px
        }
        :root.light{
            --bg:#f5f3ef;--bg2:#eae7e1;--card:#ffffff;
            --accent:#b8862e;--accent-h:#9a6f24;--accent-glow:rgba(184,134,46,.1);
            --fg:#1a1a1a;--fg2:#444;--muted:#888;
            --border:#d8d4ce;--err:#c03030
        }
        body{
            font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
            background:var(--bg);color:var(--fg);
            height:100vh;height:100dvh;overflow:hidden;
            transition:background .3s,color .3s
        }

        #pw-screen{
            position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
            background:var(--bg);z-index:100;padding:20px;transition:background .3s
        }
        #pw-screen::before{
            content:'';position:absolute;width:420px;height:420px;border-radius:50%;
            background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);
            top:18%;left:50%;transform:translateX(-50%);pointer-events:none
        }
        .pw-card{
            position:relative;background:var(--card);border:1px solid var(--border);
            border-radius:20px;padding:40px 28px 32px;width:100%;max-width:380px;
            text-align:center;
            box-shadow:0 0 80px var(--accent-glow),0 24px 64px rgba(0,0,0,.5);
            animation:cardIn .5s ease;transition:background .3s,border-color .3s
        }
        @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
        .lock-wrap{
            width:60px;height:60px;border:2px solid var(--accent);border-radius:50%;
            display:flex;align-items:center;justify-content:center;margin:0 auto 24px;
            color:var(--accent);background:var(--accent-glow)
        }
        .pw-card h1{font-size:24px;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
        .pw-card .sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:28px}
        .inp-wrap{position:relative;margin-bottom:8px}
        .inp-wrap input{
            width:100%;padding:14px 48px 14px 16px;background:var(--bg);
            border:1.5px solid var(--border);border-radius:var(--rad);color:var(--fg);
            font-size:15px;font-family:inherit;outline:none;
            transition:border-color .2s,background .3s,color .3s
        }
        .inp-wrap input:focus{border-color:var(--accent)}
        .inp-wrap input.shake{border-color:var(--err);animation:shake .4s ease}
        @keyframes shake{
            0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}
            40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}
        }
        .eye-btn{
            position:absolute;right:4px;top:50%;transform:translateY(-50%);
            width:40px;height:40px;display:flex;align-items:center;justify-content:center;
            background:none;border:none;color:var(--muted);cursor:pointer;border-radius:8px
        }
        .eye-btn:active{color:var(--fg)}
        .fld-err{color:var(--err);font-size:13px;min-height:28px;line-height:28px;text-align:left;padding-left:4px}
        .go-btn{
            width:100%;padding:14px;background:var(--accent);color:#0a0a0a;border:none;
            border-radius:var(--rad);font-size:15px;font-weight:700;font-family:inherit;
            cursor:pointer;transition:background .15s,transform .1s;margin-top:4px
        }
        .go-btn:active{transform:scale(.97);background:var(--accent-h)}
        .go-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

        #ld-screen{
            position:fixed;inset:0;display:none;flex-direction:column;
            align-items:center;justify-content:center;background:var(--bg);z-index:90;
            transition:background .3s
        }
        .sp{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:24px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .ld-txt{font-size:15px;font-weight:500;color:var(--fg2)}
        .ld-det{font-size:13px;color:var(--muted);margin-top:8px;font-variant-numeric:tabular-nums}

        #chat-view{display:none;flex-direction:column;height:100vh;height:100dvh}
        .ch-hdr{
            flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);
            padding:10px 16px;padding-top:max(10px,env(safe-area-inset-top));
            display:flex;align-items:center;gap:12px;z-index:10;
            transition:background .3s,border-color .3s
        }
        .hdr-icon{
            width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent-h));
            border-radius:10px;display:flex;align-items:center;justify-content:center;
            flex-shrink:0;color:#0a0a0a
        }
        .hdr-info{flex:1;min-width:0}
        .hdr-info h2{font-size:15px;font-weight:700;letter-spacing:-.2px}
        .pg-jumper{
            display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-top:2px
        }
        .pg-input{
            width:42px;padding:2px 4px;background:var(--bg);border:1px solid var(--border);
            border-radius:4px;color:var(--fg);font-size:12px;font-family:inherit;
            text-align:center;outline:none;-moz-appearance:textfield;
            transition:border-color .2s,background .3s,color .3s
        }
        .pg-input::-webkit-inner-spin-button,
        .pg-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
        .pg-input:focus{border-color:var(--accent)}
        .pg-jumper-sep{color:var(--muted);font-weight:500}

        .theme-btn{
            width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
            background:var(--card);display:flex;align-items:center;justify-content:center;
            cursor:pointer;color:var(--fg);flex-shrink:0;
            transition:background .2s,border-color .2s,transform .1s
        }
        .theme-btn:active{transform:scale(.9)}
        
        .ch-scroll{
            flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
            padding:16px 12px 40px;
            background:var(--bg)
        }
        .ch-scroll::-webkit-scrollbar{width:3px}
        .ch-scroll::-webkit-scrollbar-track{background:transparent}
        .ch-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        /* Text Page Styles */
        .text-page{
            padding:12px 0;
            border-bottom:1px solid var(--border)
        }
        .page-marker{
            display:inline-block;
            background:var(--accent);color:#0a0a0a;
            font-size:10px;font-weight:700;padding:2px 8px;
            border-radius:4px;margin-bottom:12px;
            text-transform:uppercase;letter-spacing:.5px
        }
        .chat-line{
            font-size:14px;line-height:1.6;
            margin-bottom:6px;color:var(--fg2);
            word-wrap:break-word;white-space:pre-wrap
        }
        .chat-line strong{
            color:var(--fg);font-weight:700;
            display:inline
        }
        .chat-line .timestamp{
            color:var(--muted);font-size:12px;
            margin-right:6px;font-weight:400
        }

        /* Fallback Image Styles (if a page is a scanned photo) */
        .img-page{
            background:var(--card);border:1px solid var(--border);
            border-left:3px solid var(--accent);border-radius:var(--rad);
            overflow:hidden;flex-shrink:0;margin-bottom:16px;
            transition:background .3s,border-color .3s
        }
        .img-page-head{
            padding:6px 12px;border-bottom:1px solid var(--border);
            background:rgba(255,255,255,.01);transition:border-color .3s
        }
        .img-page-tag{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
        .img-page img{
            width:100%;display:block;min-height:80px;background:var(--bg);
            transition:filter .3s,background .3s
        }
        :root.light .img-page img{
            filter:invert(1) hue-rotate(180deg)
        }

        .sb-btn{
            position:fixed;bottom:20px;bottom:max(20px,env(safe-area-inset-bottom));
            right:16px;width:44px;height:44px;border-radius:50%;
            background:var(--card);border:1px solid var(--border);color:var(--fg);
            display:none;align-items:center;justify-content:center;cursor:pointer;
            z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.4);
            transition:transform .15s,background .3s,border-color .3s
        }
        .sb-btn:active{transform:scale(.9);background:var(--border)}
        .sb-btn.on{display:flex}
        .toast{
            position:fixed;bottom:80px;left:50%;
            transform:translateX(-50%) translateY(80px);
            background:var(--card);border:1px solid var(--border);color:var(--fg);
            padding:10px 20px;border-radius:10px;font-size:13px;z-index:200;
            transition:transform .3s ease,background .3s,border-color .3s,color .3s;
            white-space:nowrap;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.4)
        }
        .toast.on{transform:translateX(-50%) translateY(0)}
        .toast.t-err{border-color:var(--err);color:var(--err)}

        @media(prefers-reduced-motion:reduce){
            .pw-card{animation:none}
            .sp{animation-duration:1.5s}
            .inp-wrap input.shake{animation:none}
        }
    </style>
</head>
<body>

    <div id="pw-screen">
        <div class="pw-card">
            <div class="lock-wrap">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1>Chat Archive</h1>
            <p class="sub">This archive is password-protected. Enter the correct password to view the messages inside.</p>
            <div class="inp-wrap">
                <input type="password" id="pw-in" placeholder="Enter password" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                <button class="eye-btn" id="eye-b" type="button" aria-label="Toggle password visibility">
                    <svg id="eye-o" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg id="eye-c" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
            <div class="fld-err" id="fld-err"></div>
            <button class="go-btn" id="go-btn">Unlock Archive</button>
        </div>
    </div>

    <div id="ld-screen">
        <div class="sp"></div>
        <div class="ld-txt" id="ld-txt">Decrypting archive...</div>
        <div class="ld-det" id="ld-det"></div>
    </div>

    <div id="chat-view">
        <header class="ch-hdr">
            <div class="hdr-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                </svg>
            </div>
            <div class="hdr-info">
                <h2>Chat Archive</h2>
                <div class="pg-jumper">
                    <input type="number" id="pg-input" value="1" min="1" class="pg-input" inputmode="numeric">
                    <span class="pg-jumper-sep">/</span>
                    <span id="pg-total">0</span>
                </div>
            </div>
            <button class="theme-btn" id="theme-b" aria-label="Toggle theme">
                <svg id="ico-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="ico-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </header>
        <div class="ch-scroll" id="ch-scroll"></div>
        
        <button class="sb-btn" id="sb-btn" aria-label="Scroll to latest messages">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </button>
    </div>

    <div class="toast" id="toast-el"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        var PDF_FILE = 'chat.pdf';
        // Lower scale for fallback images since they are only used if text fails
        var IMG_SCALE = 1.5;  
        var JPG_Q     = 0.8; 

        var pdf         = null;
        var totalPgs    = 0;
        var isDark      = true;
        var currentPage = 1;

        var $pw      = document.getElementById('pw-screen');
        var $ld      = document.getElementById('ld-screen');
        var $cv      = document.getElementById('chat-view');
        var $pwIn    = document.getElementById('pw-in');
        var $eyeB    = document.getElementById('eye-b');
        var $eyeO    = document.getElementById('eye-o');
        var $eyeC    = document.getElementById('eye-c');
        var $fErr    = document.getElementById('fld-err');
        var $goBtn   = document.getElementById('go-btn');
        var $ldTxt   = document.getElementById('ld-txt');
        var $ldDet   = document.getElementById('ld-det');
        var $scroll  = document.getElementById('ch-scroll');
        var $sb      = document.getElementById('sb-btn');
        var $toast   = document.getElementById('toast-el');
        var $themeB  = document.getElementById('theme-b');
        var $icoSun  = document.getElementById('ico-sun');
        var $icoMoon = document.getElementById('ico-moon');
        var $pgInput = document.getElementById('pg-input');
        var $pgTotal = document.getElementById('pg-total');

        /* Theme Setup */
        var saved = localStorage.getItem('chat-arc-theme');
        if (saved === 'light') {
            isDark = false;
            document.documentElement.classList.add('light');
            $icoSun.style.display  = 'none';
            $icoMoon.style.display = 'block';
        }

        $themeB.addEventListener('click', function() {
            isDark = !isDark;
            if (isDark) {
                document.documentElement.classList.remove('light');
                $icoSun.style.display  = 'block';
                $icoMoon.style.display = 'none';
                localStorage.setItem('chat-arc-theme', 'dark');
            } else {
                document.documentElement.classList.add('light');
                $icoSun.style.display  = 'none';
                $icoMoon.style.display = 'block';
                localStorage.setItem('chat-arc-theme', 'light');
            }
        });

        /* Password Screen */
        $eyeB.addEventListener('click', function() {
            var show = $pwIn.type === 'password';
            $pwIn.type = show ? 'text' : 'password';
            $eyeO.style.display = show ? 'none' : 'block';
            $eyeC.style.display = show ? 'block' : 'none';
        });

        $pwIn.addEventListener('input', function() {
            $fErr.textContent = '';
            $pwIn.classList.remove('shake');
        });

        $pwIn.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') $goBtn.click();
        });

        $goBtn.addEventListener('click', function() {
            var v = $pwIn.value;
            if (!v) {
                $fErr.textContent = 'Please enter a password.';
                $pwIn.classList.add('shake');
                return;
            }
            $fErr.textContent = '';
            $pwIn.classList.remove('shake');
            $goBtn.disabled = true;
            $goBtn.textContent = 'Verifying...';
            tryLoad(v);
        });

        /* Page Jumper */
        $pgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                this.blur(); 
                jumpToPage(this.value);
            }
        });

        $pgInput.addEventListener('blur', function() {
            if (this.value != currentPage) {
                jumpToPage(this.value);
            } else {
                this.value = currentPage; 
            }
        });

        function jumpToPage(target) {
            target = parseInt(target);
            if (isNaN(target) || target < 1 || target > totalPgs) {
                toast('Enter a valid page (1-' + totalPgs + ')', true);
                $pgInput.value = currentPage;
                return;
            }

            var el = document.querySelector('[data-pg="' + target + '"]');
            if (el) {
                el.scrollIntoView({ behavior: 'smooth' });
            } else {
                $pgInput.value = currentPage; 
            }
        }

        /* Scroll Tracking */
        var scrollTick = false;
        function updateCurrentPage() {
            var pages = $scroll.querySelectorAll('[data-pg]');
            var current = 1;
            var scrollRect = $scroll.getBoundingClientRect();
            
            for (var i = 0; i < pages.length; i++) {
                var rect = pages[i].getBoundingClientRect();
                if (rect.top <= scrollRect.top + 100) {
                    current = parseInt(pages[i].getAttribute('data-pg'));
                } else {
                    break; 
                }
            }
            
            if (current !== currentPage) {
                currentPage = current;
                if (document.activeElement !== $pgInput) {
                    $pgInput.value = currentPage;
                }
            }
        }

        /* Toast */
        var _tt = null;
        function toast(msg, err) {
            clearTimeout(_tt);
            $toast.textContent = msg;
            $toast.className = 'toast' + (err ? ' t-err' : '');
            void $toast.offsetHeight;
            $toast.classList.add('on');
            _tt = setTimeout(function() { $toast.classList.remove('on'); }, 3500);
        }

        /* =============================================
           Load PDF
           ============================================= */
        function tryLoad(pw) {
            $pw.style.display = 'none';
            $ld.style.display = 'flex';
            $ldTxt.textContent = 'Decrypting archive...';
            $ldDet.textContent = '';

            pdfjsLib.getDocument({ url: PDF_FILE, password: pw })
            .promise.then(function(doc) {
                pdf = doc;
                totalPgs = doc.numPages;
                $pgTotal.textContent = totalPgs;
                $pgInput.max = totalPgs;

                $ldTxt.textContent = 'Extracting text...';
                $ldDet.textContent = '0 / ' + totalPgs;

                extractFullDocument().then(function() {
                    $ld.style.display = 'none';
                    $cv.style.display = 'flex';
                    
                    currentPage = totalPgs;
                    $pgInput.value = currentPage;
                    $scroll.scrollTop = $scroll.scrollHeight;
                });
            })
            .catch(function(e) {
                console.error(e);
                $ld.style.display = 'none';
                $pw.style.display = 'flex';
                $goBtn.disabled = false;
                $goBtn.textContent = 'Unlock Archive';

                if (e.name === 'PasswordException') {
                    $fErr.textContent = 'Wrong password. Please try again.';
                    $pwIn.classList.add('shake');
                    $pwIn.value = '';
                    $pwIn.focus();
                } else {
                    $fErr.textContent = 'File not found. Make sure "' + PDF_FILE + '" is uploaded.';
                    $pwIn.classList.add('shake');
                }
            });
        }

        /* =============================================
           Text Extraction & Fallback Image Engine
           ============================================= */
        function extractFullDocument() {
            var done = 0;
            var cur = 1;

            function next() {
                if (cur > totalPgs) {
                    return Promise.resolve();
                }

                var num = cur;
                cur++;

                return pdf.getPage(num).then(function(page) {
                    // 1. Try to get text
                    return page.getTextContent().then(function(textContent) {
                        var text = parseTextItems(textContent.items);
                        
                        if (text) {
                            // Success: Render as fast HTML text
                            var div = document.createElement('div');
                            div.className = 'text-page';
                            div.setAttribute('data-pg', num);
                            div.innerHTML = '<div class="page-marker">Page ' + num + '</div>' + text;
                            $scroll.appendChild(div);
                        } else {
                            // Fallback: Page is a photo/scanned image. Render to canvas.
                            return renderImagePage(page, num);
                        }

                        done++;
                        $ldDet.textContent = done + ' / ' + totalPgs;
                        return next();
                    });
                }).catch(function(err) {
                    console.error('Failed page ' + num, err);
                    done++;
                    $ldDet.textContent = done + ' / ' + totalPgs;
                    return next(); 
                });
            }

            return next();
        }

        /* 
           Parses raw PDF text items into readable HTML lines.
           Groups items by Y coordinate to form sentences, 
           and sorts by X coordinate to fix left-to-right reading order.
        */
        function parseTextItems(items) {
            if (!items || !items.length) return null;

            var lines = {};
            items.forEach(function(item) {
                var str = item.str.trim();
                if (!str) return;
                
                // Y coordinate defines the line. Round to nearest 2px to group broken words.
                var y = Math.round(item.transform[5] / 2) * 2;
                if (!lines[y]) lines[y] = [];
                
                lines[y].push({ 
                    x: item.transform[4], 
                    text: str 
                });
            });

            var sortedYs = Object.keys(lines).sort(function(a, b) { return b - a; }); // Top to bottom
            if (!sortedYs.length) return null;

            var html = '';
            sortedYs.forEach(function(y) {
                // Sort left to right
                lines[y].sort(function(a, b) { return a.x - b.x; });
                
                // Join words on same line
                var lineText = lines[y].map(function(t) { return t.text; }).join(' ');
                
                // Auto-format chat patterns (e.g., "10/10/23, 10:00 AM - Name: Message")
                // Makes the timestamp grey and the name bold
                var formatted = lineText.replace(
                    /^([\d\/,\s: AMP]+ - )([^:]{1,30}?):\s(.*)/i, 
                    '<span class="timestamp">$1</span><strong>$2:</strong> $3'
                );
                
                // Simpler fallback for "Name: Message"
                if (formatted === lineText) {
                    formatted = lineText.replace(
                        /^([^:]{1,30}?):\s(.*)/, 
                        '<strong>$1:</strong> $2'
                    );
                }

                html += '<p class="chat-line">' + formatted + '</p>';
            });

            return html;
        }

        /* Fallback for scanned pages */
        function renderImagePage(page, num) {
            var vp = page.getViewport({ scale: IMG_SCALE });
            var c = document.createElement('canvas');
            c.width = Math.floor(vp.width);
            c.height = Math.floor(vp.height);

            return page.render({ canvasContext: c.getContext('2d'), viewport: vp })
            .promise.then(function() {
                // Invert colors if in dark mode
                if (isDark) {
                    var ctx = c.getContext('2d');
                    ctx.globalCompositeOperation = 'difference';
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, c.width, c.height);
                    ctx.globalCompositeOperation = 'source-over';
                }

                var card = document.createElement('div');
                card.className = 'img-page';
                card.setAttribute('data-pg', num);

                var head = document.createElement('div');
                head.className = 'img-page-head';
                head.innerHTML = '<span class="img-page-tag">Scanned Page ' + num + '</span>';

                var img = document.createElement('img');
                img.src = c.toDataURL('image/jpeg', JPG_Q);

                card.appendChild(head);
                card.appendChild(img);
                $scroll.appendChild(card);

                // Free memory
                c.width = 0;
                c.height = 0;
            });
        }

        /* Scroll handling */
        $scroll.addEventListener('scroll', function() {
            if (!scrollTick) {
                requestAnimationFrame(function() {
                    updateCurrentPage();
                    scrollTick = false;
                });
                scrollTick = true;
            }

            var fromBot = $scroll.scrollHeight - $scroll.scrollTop - $scroll.clientHeight;
            if (fromBot > 600) { $sb.classList.add('on'); }
            else               { $sb.classList.remove('on'); }
        });

        /* Scroll to bottom */
        $sb.addEventListener('click', function() {
            $scroll.scrollTo({ top: $scroll.scrollHeight, behavior: 'smooth' });
        });
    </script>
</body>
</html>
